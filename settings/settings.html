<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Translation Extension Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <form id="settings-form">
    <label>
      <span>API Base URL</span>
      <input type="url" id="apiBaseUrl" value="https://generativelanguage.googleapis.com/v1beta/openai" required>
    </label>
    <label>
      <span>API Key</span>
      <input type="password" id="apiKey" placeholder="sk-..." required>
    </label>
    <label>
      <span>Model Name</span>
      <input type="text" id="modelName" value="gemini-3.1-flash-lite" required>
    </label>
    <button type="submit">Save</button>
  </form>
  <div id="toast"></div>
  <script src="settings.js"></script>
</body>
</html>
